<svg width="850" height="400" viewBox="0 0 850 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Clipping window for the scrolling log -->
    <clipPath id="log-window">
      <rect x="0" y="0" width="800" height="100" />
    </clipPath>
  </defs>

  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Staggered vertical scroll for "tail -f" effect */
    @keyframes staggeredScroll {
      0%, 15% { transform: translateY(0); }
      20%, 35% { transform: translateY(-30px); }
      40%, 55% { transform: translateY(-60px); }
      60%, 75% { transform: translateY(-90px); }
      80%, 95% { transform: translateY(-120px); }
      100% { transform: translateY(-150px); }
    }

    .bg { fill: #0a0e14; }
    .term-header { fill: #151a21; }
    .text-cyan {
      font-family: 'Courier New', Courier, monospace;
      font-size: 24px;
      font-weight: bold;
      fill: #00f5ff;
    }
    .text-cmd {
      font-family: 'Courier New', Courier, monospace;
      font-size: 24px;
      fill: #a1faff;
    }
    .text-body {
      font-family: 'Courier New', Courier, monospace;
      font-size: 18px;
      fill: #00e5ee;
      opacity: 0;
      animation: fadeIn 0.4s ease-out forwards;
    }
    .text-green {
      font-family: 'Courier New', Courier, monospace;
      font-size: 18px;
      fill: #27c93f;
    }
    .cursor {
      fill: #00f5ff;
      animation: blink 1s step-end infinite;
    }
    .glow {
      filter: drop-shadow(0 0 5px rgba(0, 245, 255, 0.4));
    }
    
    .log-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 18px;
      fill: #00FF41;
      font-weight: bold;
    }

    .scrolling-group {
      animation: staggeredScroll 12s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95);
    }

    /* Animation Timings */
    .line-1 { animation-delay: 0.5s; }
    .line-2 { animation-delay: 0.8s; }
    .line-3 { animation-delay: 1.1s; }
    .line-4 { animation-delay: 1.4s; }
  </style>

  <!-- Background -->
  <rect width="850" height="400" rx="10" class="bg" stroke="#00f5ff" stroke-width="2" stroke-opacity="0.3"/>
  
  <!-- Terminal Header Bar -->
  <rect width="850" height="40" rx="10" class="term-header"/>
  <circle cx="25" cy="20" r="6" fill="#ff5f56" />
  <circle cx="45" cy="20" r="6" fill="#ffbd2e" />
  <circle cx="65" cy="20" r="6" fill="#27c93f" />
  <text x="425" y="25" font-family="monospace" font-size="12" fill="#51555c" text-anchor="middle">root@gwu:~/shrey-patel</text>

  <!-- Section 1: whoami -->
  <g transform="translate(35, 80)">
    <text class="text-cyan glow">root@gwu:~$ <tspan class="text-cmd">whoami</tspan><tspan class="cursor">_</tspan></text>
    <text y="35" class="text-body line-1">> SHREY PATEL</text>
    <text y="65" class="text-body line-2">> Cybersecurity MS Candidate @ GWU</text>
    <text y="95" class="text-body line-3">> Engineer | Inventor | Hackathon Champion</text>
    <text y="125" class="text-body line-4 text-green">> [SYSTEM] All protocols active. Ready for deployment.</text>
  </g>

  <!-- Section 2: achievements (Active Log) -->
  <g transform="translate(35, 260)">
    <text class="text-cyan glow">root@gwu:~$ <tspan class="text-cmd">tail -f achievements.log</tspan></text>
    
    <!-- Viewing Window for Logs -->
    <g transform="translate(20, 30)" clip-path="url(#log-window)">
      <g class="scrolling-group">
        <text y="20" class="log-text">🛡️ BisonHacks 2026: 1st Place (Graduate Team)</text>
        <text y="50" class="log-text">🌿 Google DevFest DC 2025: Most Innovative</text>
        <text y="80" class="log-text">📜 Patent #572350 IN: Smart Traffic Mgmt (GRANTED)</text>
        <text y="110" class="log-text">🌾 George Hacks 2025: 1st Place (Health / Environment)</text>
        <text y="140" class="log-text">⚡ NCL CTF: Ranked 120th National</text>
        
        <!-- Repeat for seamless loop padding -->
        <text y="170" class="log-text">🛡️ BisonHacks 2026: 1st Place (Graduate Team)</text>
        <text y="200" class="log-text">🌿 Google DevFest DC 2025: Most Innovative</text>
      </g>
    </g>
  </g>
</svg>
